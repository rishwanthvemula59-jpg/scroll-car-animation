<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ITZ BUNNY — Scroll Car Animation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="section">
    <div class="track">

      <!-- ── Road ─────────────────────────────────────────── -->
      <div class="road" id="road">

        <!-- Road markings (decorative, behind everything) -->
        <div class="road-shoulders"></div>
        <div class="road-center"></div>

        <!-- ── Inline SVG Car (nose faces DOWN → right after -90deg rotate) ── -->
        <svg id="car" class="car" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <!-- Body gradient: dark flanks, slightly lighter centre -->
            <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#111111" />
              <stop offset="30%" stop-color="#252525" />
              <stop offset="50%" stop-color="#2e2e2e" />
              <stop offset="70%" stop-color="#252525" />
              <stop offset="100%" stop-color="#111111" />
            </linearGradient>
            <!-- Glass gradient -->
            <linearGradient id="glassGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#1e3f6e" stop-opacity="0.95" />
              <stop offset="100%" stop-color="#0c2040" stop-opacity="1" />
            </linearGradient>
            <!-- Headlight glow -->
            <filter id="headGlow" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="3" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
            <!-- Tail-light glow -->
            <filter id="tailGlow" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="2.5" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>

          <!-- ── REAR TYRES (top of SVG = rear of car) ────────── -->
          <rect x="28" y="10" width="20" height="36" rx="5" fill="#0a0a0a" />
          <rect x="152" y="10" width="20" height="36" rx="5" fill="#0a0a0a" />
          <!-- Rim -->
          <rect x="31" y="14" width="14" height="28" rx="4" fill="#1c1c1c" />
          <rect x="155" y="14" width="14" height="28" rx="4" fill="#1c1c1c" />
          <circle cx="38" cy="28" r="5" fill="#111" />
          <circle cx="162" cy="28" r="5" fill="#111" />

          <!-- ── FRONT TYRES (bottom of SVG = front of car) ─────── -->
          <rect x="28" y="154" width="20" height="36" rx="5" fill="#0a0a0a" />
          <rect x="152" y="154" width="20" height="36" rx="5" fill="#0a0a0a" />
          <rect x="31" y="158" width="14" height="28" rx="4" fill="#1c1c1c" />
          <rect x="155" y="158" width="14" height="28" rx="4" fill="#1c1c1c" />
          <circle cx="38" cy="172" r="5" fill="#111" />
          <circle cx="162" cy="172" r="5" fill="#111" />

          <!-- ── MAIN BODY ───────────────────────────────────────── -->
          <path d="
            M 72 14
            C 90 10, 110 10, 128 14
            L 148 32
            L 154 72
            L 154 128
            L 148 168
            C 128 190, 72 190, 52 168
            L 46 128
            L 46 72
            L 52 32
            Z
          " fill="url(#bodyGrad)" />

          <!-- ── REAR PANEL ──────────────────────────────────────── -->
          <path d="M 72 14 C 100 9, 128 14 128 14 L 144 30 L 56 30 Z" fill="#1a1a1a" />

          <!-- ── TAILLIGHTS (red, rear = top of SVG) ───────────── -->
          <rect x="48" y="16" width="30" height="10" rx="5" fill="#ff1111" filter="url(#tailGlow)" opacity="0.95" />
          <rect x="122" y="16" width="30" height="10" rx="5" fill="#ff1111" filter="url(#tailGlow)" opacity="0.95" />
          <!-- inner bright strip -->
          <rect x="54" y="18" width="16" height="6" rx="3" fill="#ff6666" />
          <rect x="130" y="18" width="16" height="6" rx="3" fill="#ff6666" />

          <!-- ── REAR WINDSHIELD ─────────────────────────────────── -->
          <path d="M 58 32 L 142 32 L 138 62 L 62 62 Z" fill="url(#glassGrad)" />

          <!-- ── ROOF / CABIN ────────────────────────────────────── -->
          <rect x="62" y="62" width="76" height="76" rx="4" fill="#181818" />
          <!-- Roof centre highlight strip -->
          <rect x="97" y="67" width="6" height="66" rx="3" fill="rgba(255,255,255,0.05)" />

          <!-- ── FRONT WINDSHIELD ────────────────────────────────── -->
          <path d="M 62 138 L 138 138 L 142 168 L 58 168 Z" fill="url(#glassGrad)" />

          <!-- ── FRONT NOSE ──────────────────────────────────────── -->
          <path d="M 58 168 Q 100 186 142 168 L 140 180 Q 100 200 60 180 Z" fill="#1a1a1a" />

          <!-- ── HEADLIGHTS (white/ice-blue, front = bottom of SVG) ─ -->
          <rect x="48" y="166" width="30" height="12" rx="6" fill="#c8eaff" filter="url(#headGlow)" opacity="0.97" />
          <rect x="122" y="166" width="30" height="12" rx="6" fill="#c8eaff" filter="url(#headGlow)" opacity="0.97" />
          <!-- Inner DRL bar -->
          <rect x="54" y="169" width="14" height="6" rx="3" fill="#ffffff" />
          <rect x="132" y="169" width="14" height="6" rx="3" fill="#ffffff" />

          <!-- ── SIDE MIRRORS ────────────────────────────────────── -->
          <path d="M 46 94 L 36 89 L 34 108 L 46 105 Z" fill="#1e1e1e" />
          <path d="M 154 94 L 164 89 L 166 108 L 154 105 Z" fill="#1e1e1e" />

          <!-- ── BODY REFLECTION SHIMMER ─────────────────────────── -->
          <path d="M 88 36 L 108 36 L 112 96 L 84 96 Z" fill="rgba(255,255,255,0.028)" rx="3" />
        </svg>

        <!-- Neon trail grows behind car -->
        <div class="trail" id="trail"></div>

        <!-- Headline letters revealed by the car -->
        <div class="value-add" id="valueText">
          <span class="value-letter">W</span>
          <span class="value-letter">E</span>
          <span class="value-letter">L</span>
          <span class="value-letter">C</span>
          <span class="value-letter">O</span>
          <span class="value-letter">M</span>
          <span class="value-letter">E</span>
          <span class="value-letter value-space">&nbsp;</span>
          <span class="value-letter">I</span>
          <span class="value-letter">T</span>
          <span class="value-letter">Z</span>
          <span class="value-letter value-space">&nbsp;</span>
          <span class="value-letter">B</span>
          <span class="value-letter">U</span>
          <span class="value-letter">N</span>
          <span class="value-letter">N</span>
          <span class="value-letter">Y</span>
        </div>
      </div><!-- /road -->

      <!-- ── Stat cards ────────────────────────────────────── -->
      <div class="text-box" id="box1" style="top:6%;right:30%">
        <span class="num-box">58%</span>Increase in pick up point use
      </div>
      <div class="text-box" id="box2" style="bottom:6%;right:35%">
        <span class="num-box">23%</span>Decreased in customer phone calls
      </div>
      <div class="text-box" id="box3" style="top:6%;right:10%">
        <span class="num-box">27%</span>Increase in pick up point use
      </div>
      <div class="text-box" id="box4" style="bottom:6%;right:12.5%">
        <span class="num-box">40%</span>Decreased in customer phone calls
      </div>

    </div><!-- /track -->
  </div><!-- /section -->

  <script src="script.js"></script>
</body>

</html>
